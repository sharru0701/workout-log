# Dev-only PostgreSQL for local development against a remote DB.
# Run once on the deploy server; keep running permanently.
#
# Start:  docker compose -f docker-compose.dev-db.yml up -d
# Stop:   docker compose -f docker-compose.dev-db.yml down
# Logs:   docker compose -f docker-compose.dev-db.yml logs -f

services:
  postgres-dev:
    image: postgres:16
    container_name: workoutlog-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD}
      POSTGRES_DB: workoutlog_dev
    ports:
      # Tailscale IP로 접근 가능하도록 0.0.0.0 바인딩
      # GCP 방화벽이 외부 트래픽을 차단하므로 Tailscale 망 내에서만 접근됨
      - "0.0.0.0:5435:5432"
    volumes:
      - workoutlog_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d workoutlog_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  workoutlog_pgdata_dev:
