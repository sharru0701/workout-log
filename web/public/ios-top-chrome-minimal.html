<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!--
      theme-color must be the actual page background color — NOT "transparent".
      "transparent" falls back to Safari's default opaque white/grey chrome.
      Using the real bg color makes Safari's chrome appear to seamlessly blend
      with the top of the page (the "transparent" illusion).
    -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b121c" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f6fb" />
    <title>iOS Safari Top Chrome Minimal</title>
    <style>
      :root {
        color-scheme: dark light;
      }

      * { box-sizing: border-box; }

      html {
        /* Must be solid bg, not transparent — viewport-fit:cover extends html
           behind the status bar, so this color fills that area. */
        background: #0b121c;
      }
      @media (prefers-color-scheme: light) {
        html { background: #f3f6fb; }
      }
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #edf3fb;
      }

      .canvas {
        min-height: 100svh;
        background:
          radial-gradient(circle at 20% 8%, rgba(85, 212, 205, 0.24), transparent 45%),
          linear-gradient(180deg, #0b121c 0%, #141d29 62%, #1a2533 100%);
      }

      @media (prefers-color-scheme: light) {
        body { color: #111b2a; }
        .canvas {
          background:
            radial-gradient(circle at 20% 8%, rgba(20, 127, 120, 0.12), transparent 45%),
            #f3f6fb;
        }
        .card { background: rgba(255,255,255,0.75); border-color: rgba(0,0,0,0.1); }
      }

      .hero {
        padding: 1.2rem 1rem 1rem;
      }

      .hero h1 {
        margin: 0;
        font-size: 1.6rem;
      }

      .hero p {
        margin: 0.5rem 0 0;
        color: #a8bbd2;
      }

      .content {
        padding: 0 1rem 3rem;
        display: grid;
        gap: 0.75rem;
      }

      .card {
        padding: 1rem;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(20, 29, 41, 0.75);
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <header class="hero">
        <h1>Top Chrome Transparency Check</h1>
        <p>Scroll this page in iOS Safari. Top area should blend with this gradient.</p>
      </header>
      <main class="content">
        <section class="card">Card 1</section>
        <section class="card">Card 2</section>
        <section class="card">Card 3</section>
        <section class="card">Card 4</section>
        <section class="card">Card 5</section>
        <section class="card">Card 6</section>
      </main>
    </div>
  </body>
</html>
