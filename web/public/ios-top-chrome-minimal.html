<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="transparent" />
    <title>iOS Safari Top Chrome Minimal</title>
    <style>
      :root {
        color-scheme: dark light;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #edf3fb;
      }

      .canvas {
        min-height: 100svh;
        background:
          radial-gradient(circle at 20% 8%, rgba(85, 212, 205, 0.24), transparent 45%),
          linear-gradient(180deg, #0b121c 0%, #141d29 62%, #1a2533 100%);
      }

      .hero {
        padding: 1.2rem 1rem 1rem;
      }

      .hero h1 {
        margin: 0;
        font-size: 1.6rem;
      }

      .hero p {
        margin: 0.5rem 0 0;
        color: #a8bbd2;
      }

      .content {
        padding: 0 1rem 3rem;
        display: grid;
        gap: 0.75rem;
      }

      .card {
        padding: 1rem;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(20, 29, 41, 0.75);
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <header class="hero">
        <h1>Top Chrome Transparency Check</h1>
        <p>Scroll this page in iOS Safari. Top area should blend with this gradient.</p>
      </header>
      <main class="content">
        <section class="card">Card 1</section>
        <section class="card">Card 2</section>
        <section class="card">Card 3</section>
        <section class="card">Card 4</section>
        <section class="card">Card 5</section>
        <section class="card">Card 6</section>
      </main>
    </div>
  </body>
</html>
