<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>오프라인 — Workout Log</title>
  <style>
    :root {
      --bg: #fdf6e3;
      --surface: #eee8d5;
      --border: #c6c0b0;
      --text: #586e75;
      --muted: #839496;
      --action: #2aa198;
      --action-text: #fdf6e3;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --action: #2aa198;
        --action-text: #0d1117;
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(env(safe-area-inset-top, 0px), 20px)
        max(env(safe-area-inset-right, 0px), 20px)
        max(env(safe-area-inset-bottom, 0px), 20px)
        max(env(safe-area-inset-left, 0px), 20px);
    }

    .card {
      text-align: center;
      padding: 2.5rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      max-width: 320px;
      width: 100%;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 20%;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }

    .retry-btn {
      background: var(--action);
      color: var(--action-text);
      border: none;
      border-radius: 0.625rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .retry-btn:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="/icons/icon-192.png" alt="" />
    <h1>오프라인 상태예요</h1>
    <p>
      인터넷 연결을 확인한 후 다시 시도해 주세요.<br />
      운동 기록은 기기에 안전하게 저장되어 있어요.
    </p>
    <button class="retry-btn" onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
