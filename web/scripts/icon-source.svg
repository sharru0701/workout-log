<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Workout Log / IronGraph 앱 아이콘 마스터 소스.
    풀블리드 정사각(iOS/Android 마스킹이 모서리를 둥글림). 핵심 그래픽은
    중앙 안전영역(inner ~80%) 안에 배치. 색은 앱 브랜드 액센트(인디고/퍼플)와 정합.
    모티프: 상승하는 막대(strength/volume) + 추이선·데이터 노드(progress graph).
    생성: scripts/gen-icons.mjs (sharp) — SVG 필터(blur 등)는 사용하지 않음(래스터라이저 호환).
  -->
  <defs>
    <linearGradient id="bg" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#241f38"/>
      <stop offset="1" stop-color="#121120"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="300" r="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6d5cf0" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#6d5cf0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#6d5cf0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="256" y1="140" x2="256" y2="362" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b9adff"/>
      <stop offset="1" stop-color="#5e44e6"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- ascending bars -->
  <rect x="120" y="250" width="58" height="112" rx="23" fill="url(#bar)"/>
  <rect x="227" y="205" width="58" height="157" rx="23" fill="url(#bar)"/>
  <rect x="334" y="160" width="58" height="202" rx="23" fill="url(#bar)"/>

  <!-- trend line + data nodes -->
  <polyline points="149,236 256,191 363,146" stroke="#ece8ff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="149" cy="236" r="15" fill="#ffffff"/>
  <circle cx="256" cy="191" r="15" fill="#ffffff"/>
  <circle cx="363" cy="146" r="17" fill="#ffffff"/>
</svg>
