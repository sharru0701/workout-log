name: E2E Preview

# Vercel이 GitHub에 deployment_status 이벤트를 보낼 때 실행
# Vercel ↔ GitHub 앱 연동이 전제 조건
on:
  deployment_status: {}

concurrency:
  group: e2e-preview-${{ github.event.deployment.id }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read

jobs:
  # Preview 배포가 성공 상태일 때만 실행 (Production 배포 제외)
  preview:
    name: E2E · Vercel Preview
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Preview'
    uses: ./.github/workflows/_e2e-external.yml
    with:
      ref: ${{ github.event.deployment.sha }}
      base-url: ${{ github.event.deployment_status.target_url }}
      artifact-name: playwright-preview-${{ github.event.deployment.id }}-${{ github.run_attempt }}
      retention-days: 7
      timeout-minutes: 15
    secrets: inherit
