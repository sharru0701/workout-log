name: db-migrate

on:
  # CI 워크플로우(lint+typecheck+build+e2e-smoke) 가 main에서 성공한 후 실행
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: DB Migration (${{ matrix.env }})
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env: prod
            secret: SUPABASE_DIRECT_URL
          - env: dev
            secret: SUPABASE_DEV_DIRECT_URL
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets[matrix.secret] }}
          DB_MIGRATE_RUNNER: github-actions-${{ matrix.env }}
        run: node scripts/migrate.mjs
