name: db-migrate

on:
  # CI 워크플로우(lint+typecheck+build+e2e-smoke) 가 main에서 성공한 후 실행
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: DB Migration (${{ matrix.env }})
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # Backstop: an unreachable DB should fail the job quickly, not hang for ~1h.
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - env: prod
            secret: SUPABASE_DIRECT_URL
            schema: ""
            lock_id: "872341"
          # dev: 별도 dev 프로젝트를 폐기하고 prod와 동일 인스턴스의 dev 스키마로 격리.
          #      advisory lock id를 분리해 prod 마이그레이션과의 직렬화/충돌을 피한다.
          - env: dev
            secret: SUPABASE_DIRECT_URL
            schema: dev
            lock_id: "872343"
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets[matrix.secret] }}
          DB_SCHEMA: ${{ matrix.schema }}
          DB_MIGRATE_LOCK_ID: ${{ matrix.lock_id }}
          DB_MIGRATE_RUNNER: github-actions-${{ matrix.env }}
        run: node scripts/migrate.mjs
