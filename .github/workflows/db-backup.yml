name: "Daily Supabase DB Backup to Supabase Storage"

on:
  schedule:
    # 매일 새벽 4시 (KST = UTC 19시)에 자동 실행
    - cron: "0 19 * * *"
  workflow_dispatch: # Github Actions 탭에서 수동으로도 실행할 수 있게 허용

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL Tools & jq
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq

      - name: Extract Supabase Details
        id: supabase
        run: |
          # URL 파싱하여 프로젝트 고유 ID 알아내기
          URL="${{ secrets.SUPABASE_DIRECT_URL }}"
          # 정규식 패턴: postgres.[PROJECT_REF]:
          PROJECT_REF=$(echo "$URL" | sed -n 's/.*postgres\.\(.*\)[:@].*/\1/p' | cut -d: -f1)
          echo "PROJECT_REF=$PROJECT_REF" >> $GITHUB_ENV
          echo "SUPABASE_REST_URL=https://${PROJECT_REF}.supabase.co" >> $GITHUB_ENV

      - name: Run pg_dump & Compress
        run: |
          BACKUP_FILE="workoutlog_backup_$(date +'%Y%m%d_%H%M%S').sql.gz"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> $GITHUB_ENV
          
          echo "Generating PostgreSQL public schema dump..."
          pg_dump "${{ secrets.SUPABASE_DIRECT_URL }}" \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --schema=public \
            | gzip > "${BACKUP_FILE}"
          
          echo "✅ Backup created successfully: ${BACKUP_FILE}"

      - name: Upload to Supabase Storage
        run: |
          echo "Uploading ${BACKUP_FILE} to Supabase 'backups' bucket..."
          # POST /storage/v1/object/bucket/file
          HTTP_STATUS=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST "${SUPABASE_REST_URL}/storage/v1/object/backups/${BACKUP_FILE}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@${BACKUP_FILE}")
            
          cat response.txt
          
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "❌ Upload failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Upload completed."

      - name: Rotate Old Backups (Retain 14 days)
        run: |
          echo "🧹 Fetching list of backups..."
          # Fetch up to 1000 items from 'backups' bucket
          FILES_JSON=$(curl -sS -X POST "${SUPABASE_REST_URL}/storage/v1/object/list/backups" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"limit": 1000, "sortBy": {"column": "created_at", "order": "asc"}}')
            
          # Date cutoff (14 days ago) in UTC ISO format
          CUTOFF_DATE=$(date -d "14 days ago" -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Looking for files created before ${CUTOFF_DATE}..."
          
          # Extract items older than 14 days. Filter out .emptyFolderPlaceholder
          # jq outputs each filename on a new line
          FILES_TO_DELETE=$(echo "$FILES_JSON" | jq -r --arg CUTOFF "$CUTOFF_DATE" '.[] | select((.created_at < $CUTOFF) and (.name != ".emptyFolderPlaceholder")) | .name')
          
          if [ -z "$FILES_TO_DELETE" ] || [ "$FILES_TO_DELETE" == "null" ]; then
            echo "No backups older than 14 days found."
            exit 0
          fi
          
          echo "The following files will be deleted:"
          echo "$FILES_TO_DELETE"
          
          # Convert filenames into JSON array for DELETE payload
          # format: {"prefixes": ["file1.sql.gz", "file2.sql.gz"]}
          JSON_PAYLOAD=$(echo "$FILES_TO_DELETE" | jq -R . | jq -sc '{prefixes: .}')
          
          echo "Deleting old files from bucket..."
          DELETE_STATUS=$(curl -sS -o del_response.txt -w "%{http_code}" \
            -X DELETE "${SUPABASE_REST_URL}/storage/v1/object/backups" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD")
            
          cat del_response.txt
          
          if [ "$DELETE_STATUS" -ne 200 ]; then
            echo "❌ Rotation deletion failed with HTTP $DELETE_STATUS"
            exit 1
          fi
          echo "✅ Old backups cleaned up successfully."
          
      - name: Security Cleanup
        if: always()
        run: |
          rm -f *.sql.gz response.txt del_response.txt
