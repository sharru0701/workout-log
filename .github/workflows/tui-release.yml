name: TUI Release

# Publishes ironlog (apps/tui) binaries to GitHub Releases when a `v*` tag is
# pushed, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/tui/go.mod
          cache-dependency-path: apps/tui/go.sum

      # Gate the release on the test suite — a tag must not publish a broken
      # binary. live_test.go is env-gated (IRONLOG_SPIKE_URL) and skips here.
      - name: Vet
        working-directory: apps/tui
        run: go vet ./...

      - name: Test
        working-directory: apps/tui
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: apps/tui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
