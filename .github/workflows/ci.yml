name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "apps/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "deploy/**"
  workflow_dispatch: {}

# PRлӢ№ мөңмӢ  pushл§Ң мӢӨн–ү вҖ” мқҙм „ мӢӨн–үмқҖ м·ЁмҶҢ
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 1: lint + typecheck + unit tests
  # к°ҖмһҘ л№ лҘё н”јл“ңл°ұ. мқҙ jobмқҙ нҶөкіјн•ҙм•ј e2e мӢңмһ‘
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  quality:
    name: Lint В· Typecheck В· Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node

      - name: Lint
        run: pnpm lint

      - name: Design lint (Hard Rules baseline)
        run: pnpm lint:design

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      # мІҳл°© м—”м§„(program-engine) н…ҢмҠӨнҠё. generateSessionмқҙ @/server/db/clientлҘј лЎңл“ң мӢңм җм—җ
      # importн•ҙ DATABASE_URLмқ„ мҡ”кө¬н•ҳлҜҖлЎң, мҲңмҲҳ мІҳл°© н…ҢмҠӨнҠём§Җл§Ң лҚ”лҜё URLлЎң import к°Җл“ңл§Ң
      # нҶөкіјмӢңнӮЁлӢӨ(мӢӨм ң DB I/O м—ҶмқҢ вҖ” м—°кІ°мқҖ lazy). operator л°ңмӮ° нҡҢк·Җ л“ұ м•Ҳм „ лҜјк°җ мІҳл°©мқ„ CI кІҢмқҙнҠёлЎң.
      - name: Program-engine tests
        env:
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci_program_engine
        run: pnpm test:program-engine

      # к·ёлҸҷм•Ҳ CIм—җ м—ҶлҚҳ лӮҳлЁём§Җ мң лӢӣ мҠӨмң„нҠё(progression мӢ¬нҷ”В·statsВ·logging-policyВ·bodyweight-loadВ·
      # session-keyВ·editor-actions л“ұ). мқјл¶Җк°Җ db/clientлҘј м „мқҙм ҒмңјлЎң importн•  мҲҳ мһҲм–ҙ лҚ”лҜё DATABASE_URLмқ„
      # мӨҖлӢӨ(мҲңмҲҳ н…ҢмҠӨнҠём—” л¬ҙн•ҙ). лҜём»ӨлІ„лқј stale н…ҢмҠӨнҠёк°Җ л°©м№ҳлҗҳлҚҳ кІғ(мҳҲ: bodyweight лҜём„Өм • мІҳл°©)мқ„ CI кІҢмқҙнҠёлЎң.
      - name: Extended unit tests
        env:
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci_extra
        run: pnpm test:extra

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job: apps/api typecheck
  # apps/api reuses web/src via @/* alias + runs on tsx (no compile step), so a
  # web/src/server refactor can break the production backend with no other gate.
  # Needs web deps installed (drizzle/pg types resolve from web/node_modules).
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  apps-api:
    name: apps/api Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node # installs web deps (@/* вҶ’ web/src)

      - name: Install apps/api deps
        working-directory: apps/api
        run: pnpm install --frozen-lockfile

      - name: Typecheck apps/api
        working-directory: apps/api
        run: pnpm typecheck

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job: TUI (apps/tui) build В· vet В· test
  # Go tests were previously developer-run only (never gated). live_test.go is
  # env-gated (IRONLOG_SPIKE_URL) and skips here вҖ” unit/snapshot tests run.
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  tui:
    name: TUI Build В· Vet В· Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/tui/go.mod
          cache-dependency-path: apps/tui/go.sum

      - name: Build
        working-directory: apps/tui
        run: go build ./...

      - name: Vet
        working-directory: apps/tui
        run: go vet ./...

      - name: Test
        working-directory: apps/tui
        run: go test ./...

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 2: Playwright smoke E2E
  # quality нҶөкіј нӣ„ мӢӨн–ү. PostgreSQL м„ңл№„мҠӨ м»Ён…Ңмқҙл„Ҳ + next dev м„ңлІ„.
  # л№Ңл“ң кІҖмҰқмқҖ Vercel Preview л№Ңл“ңк°Җ лӢҙлӢ№ (мқҙмӨ‘ л№Ңл“ң нҡҢн”ј)
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  e2e-smoke:
    name: E2E Smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workout_log_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node
      - uses: ./.github/actions/playwright-install

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
        run: pnpm db:migrate

      - name: Seed DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
          WORKOUT_AUTH_USER_ID: ci-user
        run: pnpm db:seed

      - name: Run smoke E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
          WORKOUT_AUTH_USER_ID: ci-user
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
          NEXT_TELEMETRY_DISABLED: "1"
          PLAYWRIGHT_SERVER_MODE: dev
          CI: "true"
        run: pnpm exec playwright test e2e/smoke.spec.ts --project chromium

      # мӢӨнҢЁ мӢң trace/screenshot/videoлҘј artifactлЎң ліҙкҙҖ
      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 14
