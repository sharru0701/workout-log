name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "apps/**"
      - "packages/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "deploy/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch: {}

# PR당 최신 push만 실행 — 이전 실행은 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: lint + typecheck + unit tests
  # 가장 빠른 피드백. 이 job이 통과해야 e2e 시작
  # ──────────────────────────────────────────────
  quality:
    name: Lint · Typecheck · Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node

      - name: Lint
        run: pnpm lint

      - name: Design lint (Hard Rules baseline)
        run: pnpm lint:design

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      # 처방 엔진(program-engine) 테스트. generateSession이 @/server/db/client를 로드 시점에
      # import해 DATABASE_URL을 요구하므로, 순수 처방 테스트지만 더미 URL로 import 가드만
      # 통과시킨다(실제 DB I/O 없음 — 연결은 lazy). operator 발산 회귀 등 안전 민감 처방을 CI 게이트로.
      - name: Program-engine tests
        env:
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci_program_engine
        run: pnpm test:program-engine

      # 그동안 CI에 없던 나머지 유닛 스위트(progression 심화·stats·logging-policy·bodyweight-load·
      # session-key·editor-actions 등). 일부가 db/client를 전이적으로 import할 수 있어 더미 DATABASE_URL을
      # 준다(순수 테스트엔 무해). 미커버라 stale 테스트가 방치되던 것(예: bodyweight 미설정 처방)을 CI 게이트로.
      - name: Extended unit tests
        env:
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci_extra
        run: pnpm test:extra

  # ──────────────────────────────────────────────
  # Job: apps/api typecheck
  # apps/api reuses web/src via @/* alias + runs on tsx (no compile step), so a
  # web/src/server refactor can break the production backend with no other gate.
  # 워크스페이스 루트 install 한 번으로 web·apps/api·packages/core 의존이 모두 깔린다.
  # ──────────────────────────────────────────────
  apps-api:
    name: apps/api Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node

      - name: Typecheck apps/api
        working-directory: apps/api
        run: pnpm typecheck

  # ──────────────────────────────────────────────
  # Job: packages/core typecheck + test
  # web·apps/api가 공유하는 source-only 패키지. 자체 게이트로 드리프트 조기 검출.
  # ──────────────────────────────────────────────
  core:
    name: packages/core Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node

      - name: Typecheck packages/core
        working-directory: packages/core
        run: pnpm typecheck

      - name: Test packages/core
        working-directory: packages/core
        run: pnpm test

  # ──────────────────────────────────────────────
  # Job: TUI (apps/tui) build · vet · test
  # Go tests were previously developer-run only (never gated). live_test.go is
  # env-gated (IRONLOG_SPIKE_URL) and skips here — unit/snapshot tests run.
  # ──────────────────────────────────────────────
  tui:
    name: TUI Build · Vet · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/tui/go.mod
          cache-dependency-path: apps/tui/go.sum

      - name: Build
        working-directory: apps/tui
        run: go build ./...

      - name: Vet
        working-directory: apps/tui
        run: go vet ./...

      - name: Test
        working-directory: apps/tui
        run: go test ./...

  # ──────────────────────────────────────────────
  # Job 2: Playwright smoke E2E (프로덕션 빌드 대상)
  # quality 통과 후 실행. PostgreSQL 서비스 컨테이너 + `next build && next start`.
  # 과거엔 next dev로 돌려 빌드 시간을 아꼈으나(빌드는 Vercel Preview가 담당), dev는
  # 관대해 RSC 직렬화 크래시 등 "프로덕션 빌드에서만 터지는 렌더 에러"를 못 잡았다
  # (#491 F4 사고: AppCopy를 서버→클라 prop으로 넘겨 홈 SSR 크래시, dev·번들 grep·Vercel
  # 빌드 모두 통과 → prod에서만 노출). 스모크를 prod 빌드로 돌려 이 클래스를 머지 전에 게이트.
  # ──────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workout_log_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node
      - uses: ./.github/actions/playwright-install

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
        run: pnpm db:migrate

      - name: Seed DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
          WORKOUT_AUTH_USER_ID: ci-user
        run: pnpm db:seed

      # PLAYWRIGHT_SERVER_MODE=prod → webServer가 `pnpm build && pnpm start`(프로덕션 런타임).
      # build가 migrate를 재실행하나 멱등(위 seed는 여전히 필요). prod 렌더 크래시를 여기서 게이트.
      - name: Run smoke E2E tests (prod build)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
          WORKOUT_AUTH_USER_ID: ci-user
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
          NEXT_TELEMETRY_DISABLED: "1"
          PLAYWRIGHT_SERVER_MODE: prod
          CI: "true"
        run: pnpm exec playwright test e2e/smoke.spec.ts --project chromium

      # 실패 시 trace/screenshot/video를 artifact로 보관
      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 14
