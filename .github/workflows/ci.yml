name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "deploy/**"
      - "infra/**"
  workflow_dispatch: {}

# PR당 최신 push만 실행 — 이전 실행은 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: lint + typecheck + unit tests
  # 가장 빠른 피드백. 이 job이 통과해야 e2e 시작
  # ──────────────────────────────────────────────
  quality:
    name: Lint · Typecheck · Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node

      - name: Lint
        run: pnpm lint

      - name: Design lint (Hard Rules baseline)
        run: pnpm lint:design

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

  # ──────────────────────────────────────────────
  # Job 2: Playwright smoke E2E
  # quality 통과 후 실행. PostgreSQL 서비스 컨테이너 + next dev 서버.
  # 빌드 검증은 Vercel Preview 빌드가 담당 (이중 빌드 회피)
  # ──────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workout_log_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm-node
      - uses: ./.github/actions/playwright-install

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
        run: pnpm db:migrate

      - name: Seed DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
          WORKOUT_AUTH_USER_ID: ci-user
        run: pnpm db:seed

      - name: Run smoke E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workout_log_ci
          WORKOUT_AUTH_USER_ID: ci-user
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
          NEXT_TELEMETRY_DISABLED: "1"
          PLAYWRIGHT_SERVER_MODE: dev
          CI: "true"
        run: pnpm exec playwright test e2e/smoke.spec.ts --project chromium

      # 실패 시 trace/screenshot/video를 artifact로 보관
      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 14
