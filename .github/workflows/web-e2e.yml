name: Web E2E (Playwright)

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-e2e.yml"
      - ".github/workflows/deploy.yml"
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/web-e2e.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: web-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('web/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          # `ubuntu-latest` images already include the system libraries Playwright needs.
          # Avoid `--with-deps` because apt mirror hiccups can fail the job before tests run.
          pnpm exec playwright install chromium

      - name: Run iOS Settings compliance gate
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          PLAYWRIGHT_SERVER_MODE: "dev"
        run: pnpm test:settings:compliance

      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 7
