name: deploy

on:
  workflow_run:
    workflows: [db-migrate]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  wait-vercel:
    name: Wait for Vercel Deployment
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment to be ready
        run: |
          echo "Waiting for Vercel deployment..."
          for i in $(seq 1 40); do
            STATE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1&target=production" \
              | jq -r '.deployments[0].readyState')
            echo "[$i/40] State: $STATE"
            if [ "$STATE" = "READY" ]; then
              echo "Vercel deployment is READY."
              exit 0
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Vercel deployment failed: $STATE"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for Vercel deployment."
          exit 1
