name: build&deploy

on:
  workflow_run:
    workflows: ["e2e"]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (optional)"
        required: false
        type: string

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/sharru0701/workout-log-web
  TARGET_SHA: ${{ github.event.workflow_run.head_sha || inputs.sha || github.sha }}

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
          sparse-checkout: |
            web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.TARGET_SHA }}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push (web)
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.TARGET_SHA }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 2
          sparse-checkout: |
            deploy

      - name: Tailscale connect (OAuth, tag:ci)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Cache SSH known_hosts
        id: ssh_cache
        uses: actions/cache@v5
        with:
          path: ~/.ssh/known_hosts
          key: ssh-known-hosts-${{ secrets.DEPLOY_HOST }}

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ "${{ steps.ssh_cache.outputs.cache-hit }}" != "true" ]]; then
            for i in $(seq 1 6); do
              ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts && break
              echo "ssh-keyscan retry ($i/6)..."
              sleep 5
            done
          fi

      - name: Detect deploy bundle changes
        id: deploy_bundle_changes
        shell: bash
        run: |
          set -euo pipefail

          changed_files="$(
            git show --format= --name-only "${{ env.TARGET_SHA }}" -- deploy \
              | sed '/^$/d' \
              || true
          )"

          if [[ -n "${changed_files}" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Deploy bundle changed files:"
            printf '%s\n' "${changed_files}"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No deploy bundle changes detected in ${TARGET_SHA}."
          fi

      - name: Check remote deploy bundle
        id: remote_bundle
        shell: bash
        run: |
          set -euo pipefail

          ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo mkdir -p /opt/workout-log/deploy && sudo chown -R \$USER:\$USER /opt/workout-log"

          remote_ready="$(
            ssh -T -o StrictHostKeyChecking=yes \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "test -f /opt/workout-log/deploy/docker-compose.yml && test -x /opt/workout-log/deploy/scripts/ensure_docker_headroom.sh && printf true || printf false"
          )"

          echo "ready=${remote_ready}" >> "$GITHUB_OUTPUT"
          echo "Remote deploy bundle ready: ${remote_ready}"

      - name: Upload deploy bundle to server
        if: ${{ steps.deploy_bundle_changes.outputs.has_changes == 'true' || steps.remote_bundle.outputs.ready != 'true' }}
        shell: bash
        run: |
          rsync -avz --delete \
            --exclude ".env" \
            -e "ssh -o StrictHostKeyChecking=yes" \
            ./deploy/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/workout-log/deploy/"

      - name: Skip deploy bundle upload
        if: ${{ steps.deploy_bundle_changes.outputs.has_changes != 'true' && steps.remote_bundle.outputs.ready == 'true' }}
        run: echo "Skipping deploy bundle upload; deploy/ is unchanged and the remote bundle is already present."

      - name: Deploy image by commit SHA (capture rollback SHA)
        id: deploy_sha
        shell: bash
        run: |
          set -euo pipefail

          rollback_sha="$(ssh -T -o StrictHostKeyChecking=yes "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF' || true
          set -euo pipefail
          cd /opt/workout-log/deploy

          if [[ -s .last_successful_web_sha ]]; then
            cat .last_successful_web_sha
            exit 0
          fi

          current_image="$(docker inspect -f '{{.Config.Image}}' workoutlog-web 2>/dev/null || true)"
          current_tag="${current_image##*:}"

          if [[ "${current_tag}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "${current_tag}"
          fi
          EOF
          )"

          rollback_sha="$(
            printf '%s\n' "${rollback_sha}" \
              | tr -d '\r' \
              | grep -E '^[0-9a-f]{40}$' \
              | tail -n1 \
              | xargs || true
          )"
          echo "rollback_sha=${rollback_sha}" >> "$GITHUB_OUTPUT"
          echo "Rollback candidate SHA: ${rollback_sha:-<none>}"

          ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -euo pipefail
          cd /opt/workout-log/deploy
          export WEB_IMAGE_TAG=${{ env.TARGET_SHA }}
          export KEEP_IMAGES=5
          export MIN_FREE_MB=4096
          export MAX_ROOT_USAGE_PERCENT=90
          ./scripts/ensure_docker_headroom.sh
          if docker image inspect "${{ env.IMAGE_NAME }}:${{ env.TARGET_SHA }}" >/dev/null 2>&1; then
            echo "[deploy] target image already present locally; skipping docker pull (${{ env.IMAGE_NAME }}:${{ env.TARGET_SHA }})"
          elif ! docker compose pull web; then
            echo "[deploy] docker pull failed; forcing aggressive docker cleanup and retrying once"
            AGGRESSIVE_PRUNE=1 ./scripts/ensure_docker_headroom.sh
            docker compose pull web
          fi
          echo "[deploy] running migration + seed sync before switching web container"
          docker compose run -e DB_SEED_RUNNER=ci-deploy -e WORKOUT_SEED_INCLUDE_DEMO_PLANS=0 --rm -T migrate sh -lc 'node scripts/migrate.mjs && node scripts/seed-if-needed.mjs' </dev/null
          docker compose up -d --no-deps --force-recreate web
          docker compose ps
          EOF

      - name: Healthcheck (from deploy server)
        id: healthcheck
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          HEALTHCHECK_URL="${{ secrets.DEPLOY_HEALTHCHECK_URL }}"
          if [[ -z "${HEALTHCHECK_URL}" ]]; then
            HEALTHCHECK_URL="http://127.0.0.1:3001/api/health?requiredTables=program_template,user_setting,ux_event_log,migration_run_log"
          fi

          echo "Healthcheck URL: ${HEALTHCHECK_URL}"

          HEALTHCHECK_RETRY_DELAY_SECONDS="${{ vars.DEPLOY_HEALTHCHECK_RETRY_DELAY_SECONDS }}"
          if [[ -z "${HEALTHCHECK_RETRY_DELAY_SECONDS}" ]]; then
            HEALTHCHECK_RETRY_DELAY_SECONDS=3
          fi

          set +e
          ssh_out="$(ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -euo pipefail
          healthcheck_url='${HEALTHCHECK_URL}'
          expected_sha='${{ env.TARGET_SHA }}'
          retry_delay='${HEALTHCHECK_RETRY_DELAY_SECONDS}'
          response=''
          running_image=''
          running_tag=''
          for i in \$(seq 1 18); do
            response="\$(curl -fsS --max-time 8 "\${healthcheck_url}" 2>/dev/null || true)"
            running_image="\$(docker inspect -f '{{.Config.Image}}' workoutlog-web 2>/dev/null || true)"
            running_tag="\${running_image##*:}"
            if [[ ! "\${running_tag}" =~ ^[0-9a-f]{40}$ ]]; then
              running_tag=''
            fi
            if [[ -n "\${response}" && "\${running_tag}" == "\${expected_sha}" ]]; then
              printf '%s\n' "\${response}"
              printf '__IMG__=%s\n' "\${running_image}"
              printf '__ATTEMPT__=%s\n' "\${i}"
              exit 0
            fi
            sleep "\${retry_delay}"
          done
          printf '%s\n' "\${response}"
          printf '__IMG__=%s\n' "\${running_image}"
          printf '__ATTEMPT__=%s\n' '18'
          exit 1
          EOF
          )"
          ssh_status=$?
          set -e

          response="$(printf '%s' "${ssh_out}" | grep -v '^__IMG__=' | grep -v '^__ATTEMPT__=' || true)"
          running_tag="$(
            printf '%s' "${ssh_out}" \
              | grep '^__IMG__=' | cut -d= -f2- \
              | tr -d '\r' | awk -F: '{print $NF}' \
              | grep -E '^[0-9a-f]{40}$' | tail -n1 | xargs || true
          )"
          attempt="$(
            printf '%s' "${ssh_out}" \
              | grep '^__ATTEMPT__=' | cut -d= -f2- \
              | tr -d '\r' | grep -E '^[0-9]+$' | tail -n1 | xargs || true
          )"

          actual_version=""
          if [[ -n "${response}" ]]; then
            actual_version="$(printf '%s' "${response}" | node -e "const fs=require('fs');const raw=fs.readFileSync(0,'utf8');const start=raw.indexOf('{');const end=raw.lastIndexOf('}');if(start===-1||end<start){process.stdout.write('');process.exit(0);}try{const d=JSON.parse(raw.slice(start,end+1));process.stdout.write(String(d.version||''));}catch{process.stdout.write('');}")"
          fi

          if [[ "${ssh_status}" -eq 0 ]]; then
            if [[ -n "${actual_version}" && "${actual_version}" != "${{ env.TARGET_SHA }}" ]]; then
              echo "::warning::Healthcheck version mismatch but running image tag is expected SHA (got version='${actual_version}', expected='${{ env.TARGET_SHA }}')."
            fi
            echo "Healthcheck passed with expected running image tag (${attempt:-1}/18): ${running_tag}"
            exit 0
          fi

          if [[ -z "${response}" ]]; then
            echo "Healthcheck request failed or returned empty body after ${attempt:-18} attempts. running_tag='${running_tag:-<none>}' expected='${{ env.TARGET_SHA }}'"
          elif [[ -z "${actual_version}" ]]; then
            echo "Healthcheck response version missing/unparseable after ${attempt:-18} attempts. running_tag='${running_tag:-<none>}' expected='${{ env.TARGET_SHA }}'"
          else
            echo "Healthcheck response version mismatch after ${attempt:-18} attempts: got='${actual_version}' expected='${{ env.TARGET_SHA }}' running_tag='${running_tag:-<none>}'"
          fi

          echo "Healthcheck failed. Dumping server diagnostics..."
          ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /opt/workout-log/deploy && docker compose ps && docker compose logs --tail=120 web postgres || true"
          exit 1

      - name: Migration telemetry alert check
        if: ${{ steps.healthcheck.outcome == 'success' }}
        id: migration_telemetry
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          OPS_TOKEN="${{ secrets.DEPLOY_OPS_TOKEN }}"
          if [[ -z "${OPS_TOKEN}" ]]; then
            echo "DEPLOY_OPS_TOKEN not set. Skipping migration telemetry alert check."
            exit 0
          fi

          LOOKBACK_MINUTES="${{ vars.DEPLOY_MIGRATION_ALERT_LOOKBACK_MINUTES }}"
          if [[ -z "${LOOKBACK_MINUTES}" ]]; then
            LOOKBACK_MINUTES=120
          fi

          TELEMETRY_URL="http://127.0.0.1:3001/api/ops/migrations?lookbackMinutes=${LOOKBACK_MINUTES}&limit=10"
          echo "Telemetry URL: ${TELEMETRY_URL}"

          response="$(ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "curl -sS --max-time 8 -H 'x-ops-token: ${OPS_TOKEN}' -w '\n%{http_code}' '${TELEMETRY_URL}'")"

          http_code="$(printf '%s\n' "${response}" | tail -n1)"
          payload="$(printf '%s\n' "${response}" | sed '$d')"

          echo "Migration telemetry response (status=${http_code}):"
          echo "${payload}"

          strict_mode="${{ vars.DEPLOY_MIGRATION_ALERT_STRICT }}"
          if [[ -z "${strict_mode}" ]]; then
            strict_mode=0
          fi

          if [[ "${http_code}" -ge 400 ]]; then
            echo "::warning::Migration telemetry endpoint returned HTTP ${http_code}"
            if [[ "${strict_mode}" == "1" ]]; then
              echo "DEPLOY_MIGRATION_ALERT_STRICT=1, failing deploy."
              exit 1
            fi
            exit 0
          fi

          status="$(printf '%s' "${payload}" | node -e "const fs=require('fs');const raw=fs.readFileSync(0,'utf8');const d=JSON.parse(raw||'{}');process.stdout.write(String(d.status||''));")"
          reasons="$(printf '%s' "${payload}" | node -e "const fs=require('fs');const raw=fs.readFileSync(0,'utf8');const d=JSON.parse(raw||'{}');const r=Array.isArray(d.reasons)?d.reasons:[];process.stdout.write(r.join(','));")"

          if [[ "${status}" == "critical" ]]; then
            echo "::warning::Migration telemetry is critical (${reasons:-unknown})"
            if [[ "${strict_mode}" == "1" ]]; then
              echo "DEPLOY_MIGRATION_ALERT_STRICT=1, failing deploy."
              exit 1
            fi
          fi

      - name: Mark successful deployed SHA
        if: ${{ steps.healthcheck.outcome == 'success' && steps.migration_telemetry.outcome != 'failure' }}
        id: mark_success
        shell: bash
        run: |
          ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "printf '%s' '${{ env.TARGET_SHA }}' > /opt/workout-log/deploy/.last_successful_web_sha"

      - name: Rollback to previous SHA
        if: ${{ always() && (steps.healthcheck.outcome == 'failure' || steps.migration_telemetry.outcome == 'failure' || steps.mark_success.outcome == 'failure') && steps.deploy_sha.outputs.rollback_sha != '' }}
        shell: bash
        run: |
          set -euo pipefail
          ROLLBACK_SHA="${{ steps.deploy_sha.outputs.rollback_sha }}"
          echo "Rolling back to ${ROLLBACK_SHA}"

          ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -euo pipefail
          cd /opt/workout-log/deploy
          export WEB_IMAGE_TAG=${ROLLBACK_SHA}
          docker compose pull web || true
          docker compose up -d --no-deps web
          docker compose ps
          EOF

      - name: Verify rollback health
        if: ${{ always() && (steps.healthcheck.outcome == 'failure' || steps.migration_telemetry.outcome == 'failure' || steps.mark_success.outcome == 'failure') && steps.deploy_sha.outputs.rollback_sha != '' }}
        shell: bash
        run: |
          set -euo pipefail

          HEALTHCHECK_URL="${{ secrets.DEPLOY_HEALTHCHECK_URL }}"
          if [[ -z "${HEALTHCHECK_URL}" ]]; then
            HEALTHCHECK_URL="http://127.0.0.1:3001/api/health?requiredTables=program_template,user_setting,ux_event_log,migration_run_log"
          fi

          echo "Rollback healthcheck URL: ${HEALTHCHECK_URL}"

          HEALTHCHECK_RETRY_DELAY_SECONDS="${{ vars.DEPLOY_HEALTHCHECK_RETRY_DELAY_SECONDS }}"
          if [[ -z "${HEALTHCHECK_RETRY_DELAY_SECONDS}" ]]; then
            HEALTHCHECK_RETRY_DELAY_SECONDS=3
          fi

          ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -euo pipefail
          healthcheck_url='${HEALTHCHECK_URL}'
          retry_delay='${HEALTHCHECK_RETRY_DELAY_SECONDS}'
          for i in \$(seq 1 12); do
            if curl -fsS --max-time 8 "\${healthcheck_url}" >/dev/null 2>&1; then
              printf 'Rollback healthcheck passed (%s/12)\n' "\${i}"
              exit 0
            fi
            sleep "\${retry_delay}"
          done
          exit 1
          EOF

          echo "Rollback healthcheck failed. Dumping server diagnostics..."
          ssh -T -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /opt/workout-log/deploy && docker compose ps && docker compose logs --tail=120 web postgres || true"
          exit 1

      - name: Fail workflow when deploy healthcheck failed
        if: ${{ always() && (steps.healthcheck.outcome == 'failure' || steps.migration_telemetry.outcome == 'failure' || steps.mark_success.outcome == 'failure') }}
        shell: bash
        run: |
          echo "Deploy verification failed (healthcheck or strict migration telemetry). Rollback attempted automatically."
          exit 1
